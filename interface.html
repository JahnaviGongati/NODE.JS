<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aditya University Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f2f2;
        }

        /* Header Logo */
        .header {
            background: lavender;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ddd;
        }
        .header img {
            width: 350px;
        }

        /* Banner */
        .banner img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        /* Login section */
        .login-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .box {
            width: 250px;
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .box h3 {
            text-align: center;
            margin-top: 0;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
        }

        .emp h3 { background: #7a1fa2; }
        .stu h3 { background: #ef6c00; }
        .par h3 { background: #42a5f5; }

        label {
            font-size: 14px;
            color: #ff6600;
        }

        .box input {
            width: 100%;
            padding: 6px;
            margin-bottom: 12px;
            border: 1px solid #bbb;
            border-radius: 4px;
        }

        .login-btn {
            background: #666;
            color: white;
            width: 100%;
            padding: 7px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* payment + terms */
        .center-text {
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
        }
        .center-text a {
            color: blue;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <img src="logo.png" alt="Aditya University Logo">
    </div>

    <!-- Banner -->
    <div class="banner">
        <img src="banner.jpg" alt="Banner Image">
    </div>

    <!-- Login Boxes -->
    <div class="login-container">

        <!-- Employee Login -->
        <div class="box emp">
            <h3>Employee Login</h3>
            <label>User Name :</label>
            <input type="text">

            <label>Password :</label>
            <input type="password">

            <button class="login-btn">LOGIN</button>
        </div>

        <!-- Student Login -->
        <div class="box stu">
            <h3>Student Login</h3>
            <label>User Name :</label>
            <input type="text">

            <label>Password :</label>
            <input type="password">

            <button class="login-btn">LOGIN</button>
        </div>

        <!-- Parent Login -->
        <div class="box par">
            <h3>Parent Login</h3>
            <label>User Name :</label>
            <input type="text">

            <label>Password :</label>
            <input type="password">

            <button class="login-btn">LOGIN</button>
        </div>

    </div>

    <!-- Payment and Terms -->
    <p class="center-text">
        Click <a href="#">here</a> to online payment without login
        <br><br>
        Click <a href="#">here</a> to Terms & Conditions
    </p>

</body>
</html>
